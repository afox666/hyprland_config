$font = Noto Sans CJK SC
$accent = rgba(33ccffee)
$accent2 = rgba(00ff99ee)
$fg = rgb(235, 245, 242)
$muted = rgb(190, 202, 199)
$panel = rgba(12, 16, 20, 0.36)

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 3, linear
    animation = fadeOut, 1, 3, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 7
    noise = 0.0117
    contrast = 1.12
    brightness = 0.58
    vibrancy = 0.18
    vibrancy_darkness = 0.18
}

label {
    monitor =
    text = $TIME
    color = $fg
    font_size = 92
    font_family = $font

    position = 0, 215
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    color = $muted
    font_size = 22
    font_family = $font

    position = 0, 135
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] printf '%s@%s' "$USER" "$(hostname)"
    color = $fg
    font_size = 26
    font_family = $font

    position = 0, 45
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 22%, 5%
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.28

    inner_color = $panel
    outer_color = $accent $accent2 45deg
    check_color = rgba(00ff99ee) rgba(33ccffee) 45deg
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg
    font_color = $fg
    placeholder_text = Enter password
    fail_text = $PAMFAIL
    fade_on_empty = false
    rounding = 12
    font_family = $font

    position = 0, -45
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%Y-%m-%d %H:%M:%S"
    color = rgba(235, 245, 242, 0.62)
    font_size = 14
    font_family = $font

    position = 0, 34
    halign = center
    valign = bottom
}

label {
    monitor =
    text = Press Esc to clear input
    color = rgba(235, 245, 242, 0.50)
    font_size = 13
    font_family = $font

    position = 0, 12
    halign = center
    valign = bottom
}
